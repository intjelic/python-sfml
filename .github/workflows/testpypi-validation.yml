name: TestPyPI Validation

on:
  workflow_dispatch:
    inputs:
      version:
        description: SFML version to install from TestPyPI
        required: true
      python-version:
        description: Python version to use for validation
        required: false
        default: "3.12"

jobs:
  validate-testpypi:
    name: TestPyPI Validation (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    env:
      ALSOFT_DRIVERS: "null"
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-24.04
          - macos-15
          - windows-2022

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ github.event.inputs.python-version }}

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install SFML from TestPyPI
        shell: bash
        run: |
          python -m pip install \
            --index-url https://test.pypi.org/simple/ \
            --extra-index-url https://pypi.org/simple/ \
            "SFML==${{ github.event.inputs.version }}"

      - name: Run installed-package smoke validation
        run: python .github/scripts/test-installed-package.py

      - name: Show Linux shared-library dependencies
        if: runner.os == 'Linux'
        shell: bash
        run: |
          python - <<'PY'
          from pathlib import Path
          import sfml
          root = Path(sfml.__file__).resolve().parent
          for path in sorted(root.rglob('*.so')):
              print(path)
          PY
          python - <<'PY' | while read -r so_path; do
          from pathlib import Path
          import sfml
          root = Path(sfml.__file__).resolve().parent
          for path in sorted(root.rglob('*.so')):
              print(path)
          PY
            ldd "$so_path"
          done

      - name: Show macOS shared-library dependencies
        if: runner.os == 'macOS'
        shell: bash
        run: |
          python - <<'PY' | while read -r so_path; do
          from pathlib import Path
          import sfml
          root = Path(sfml.__file__).resolve().parent
          for path in sorted(root.rglob('*.so')):
              print(path)
          PY
            otool -L "$so_path"
          done

      - name: Show Windows packaged binaries
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          python -c "from pathlib import Path; import sfml; root = Path(sfml.__file__).resolve().parent; [print(path) for pattern in ('*.pyd', '*.dll') for path in sorted(root.rglob(pattern))]"
